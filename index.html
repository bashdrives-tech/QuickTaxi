<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicktaxi | Best Taxi Service Coimbatore</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050914; --bg-card: #11151f; --primary-yellow: #FFC801; --primary-green: #25D366; --text-white: #ffffff; --text-grey: #9BA1A6; --border-color: #1a1e26; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding-bottom: 100px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .tabs-nav { display: flex; background: #050914; padding: 4px; border-radius: 10px; margin-bottom: 20px; gap: 2px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-grey); font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: var(--primary-yellow); color: #000; border-radius: 6px; }
        .btn { display: block; width: 100%; padding: 15px; text-align: center; background: var(--primary-yellow); color: #000; font-weight: 800; border-radius: 8px; text-decoration: none; margin: 10px 0; }
        .tour-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .tour-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quicktaxi</h1>
        <div class="tabs-nav">
            <button id="btn-city" class="tab-btn active" onclick="setMode('city')">City Ride</button>
            <button id="btn-oneway" class="tab-btn" onclick="setMode('oneway')">One Way</button>
            <button id="btn-air" class="tab-btn" onclick="setMode('airport')">Airport</button>
        </div>
        <!-- Calculator omitted for brevity, ensure you copy the function from previous logic -->
        <h3>Top Tour Packages</h3>
        <div class="tour-grid">
            <div class="tour-card">Ooty</div>
            <div class="tour-card">Munnar</div>
            <div class="tour-card">Kodaikanal</div>
            <div class="tour-card">Coonoor</div>
        </div>
    </div>
    <script>
        function setMode(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
        }
        // Force City Mode on Homepage
        window.onload = function() { setMode('city'); };
    </script>
</body>
</html>
